<!DOCTYPE html>
<html lang="en">
<head>
    <title>MyWebSharperAppSPA01</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        [ws-template], [ws-children-template] {
            display: none;
        }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
        }

        .wrapper {
            min-height: 100vh;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 250px;
            height: 100vh;
            background: #333;
            color: white;
            padding: 20px;
            overflow-y: auto;
        }

            .sidebar div {
                cursor: pointer;
                padding: 12px;
                border-bottom: 1px solid #444;
                transition: background 0.2s;
            }

                .sidebar div:hover {
                    background: #444;
                }

        .main-content {
            margin-left: 250px;
            padding: 30px;
            background: #f8f9fa;
            min-height: 100vh;
        }
    </style>

    <script type="text/javascript" src="Scripts/MyWebSharperAppSPA01.head.js"></script>
</head>

<body>

    <div id="main" ws-children-template="Main" class="wrapper">

        <div class="sidebar">

            <div ws-onclick="ShowAdat">
                <i class="bi bi-person-plus-fill me-2"></i>
                Competitors upload
            </div>

            <div ws-onclick="ShowLista">
                <i class="bi bi-list-ul me-2"></i>
                Competitors list
            </div>

            <div ws-onclick="ShowSorsolas">
                <i class="bi bi-dice-5-fill me-2"></i>
                Tournament draw
            </div>

        </div>

        <div class="main-content" ws-hole="MainContent"></div>

    </div>


    <div ws-template="AdatView">

        <h1 class="mb-4">Competitors upload</h1>

        <div class="card p-3 shadow-sm">

            <div class="mb-3">
                <label class="form-label">CSV file</label>
                <input id="csvFileInput" type="file" accept=".csv" class="form-control" />
            </div>

            <div class="mb-3">
                <button ws-onclick="LoadCsv" class="btn btn-primary">Load CSV</button>
            </div>

            <div class="text-muted" ws-hole="UploadStatus"></div>

        </div>

    </div>

    <script type="module" src="Scripts/MyWebSharperAppSPA01.min.js"></script>

</body>
</html>
